<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chat Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    header {
      padding: 10px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 14px; color: #aaa; font-weight: normal; }
    header input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    header input::placeholder { color: #555; }

    .main { display: flex; flex: 1; min-height: 0; }

    /* LEFT: JSON editor */
    .left {
      width: 400px;
      min-width: 200px;
      max-width: 80%;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* Resize divider */
    .divider {
      width: 5px;
      cursor: col-resize;
      background: #222;
      border-left: 1px solid #333;
      border-right: 1px solid #333;
      flex-shrink: 0;
      user-select: none;
      transition: background 0.1s;
    }
    .divider:hover, .divider.dragging { background: #4a9eff44; border-color: #4a9eff; }
    .left-tabs {
      display: flex;
      border-bottom: 1px solid #333;
      background: #1a1a1a;
    }
    .tab {
      padding: 6px 14px;
      font-size: 11px;
      cursor: pointer;
      color: #888;
      border-right: 1px solid #333;
      user-select: none;
    }
    .tab.active { color: #e0e0e0; background: #111; border-bottom: 2px solid #4a9eff; }
    .left textarea {
      flex: 1;
      background: #111;
      color: #a8d8a8;
      border: none;
      padding: 12px;
      font-family: monospace;
      font-size: 12px;
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    /* RIGHT: chat + results */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; }
    .msg-role { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .msg-text {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-text { background: #1a2a3a; border-color: #2a3a4a; }
    .msg.assistant .msg-text { background: #1a1a2a; border-color: #2a2a3a; }

    /* Tool calls display */
    .tool-calls { display: flex; flex-direction: column; gap: 6px; }
    .tool-call {
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #333;
    }
    .tool-call-header {
      background: #1e2a1e;
      padding: 6px 12px;
      font-size: 11px;
      color: #6fdd6f;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tool-call-header span { color: #888; }
    .tool-call-body {
      background: #111;
      padding: 8px 12px;
      font-size: 11px;
      color: #c8e6c9;
      overflow-x: auto;
      white-space: pre;
    }

    /* Error */
    .error-msg {
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: #ff8a80;
    }

    /* Loading */
    .loading {
      display: none;
      padding: 8px 12px;
      font-size: 12px;
      color: #666;
    }
    .loading.visible { display: block; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .dot { animation: blink 1s infinite; }

    /* Input area */
    .input-area {
      border-top: 1px solid #333;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #1a1a1a;
    }
    .input-area textarea {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 8px 10px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      resize: none;
      outline: none;
      min-height: 36px;
      max-height: 120px;
      line-height: 1.4;
    }
    .input-area textarea:focus { border-color: #4a9eff; }
    .btn {
      background: #4a9eff;
      color: #000;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
      white-space: nowrap;
    }
    .btn:hover { background: #6aafff; }
    .btn:disabled { background: #333; color: #666; cursor: default; }
    .btn-clear {
      background: transparent;
      color: #666;
      border: 1px solid #333;
      padding: 8px 10px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    .btn-clear:hover { color: #e0e0e0; border-color: #666; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>

<script>
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview-customtools:generateContent';
const API_KEY = 'AIzaSyAVbLD1kqTgcZsf_m3zoJATZ_eB-1CpAHQ';

// ── Conversation history ────────────────────────────────────────────────────
let history = [];

// ── Tab switching ───────────────────────────────────────────────────────────
const ALL_TABS = ['tripContext', 'tripPlan', 'countryData', 'basePrompt', 'toolsSchema', 'systemPrompt'];
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const id = tab.dataset.tab;
    ALL_TABS.forEach(name => {
      document.getElementById(name).style.display = name === id ? 'block' : 'none';
    });
    if (id === 'systemPrompt') rebuildFinalPrompt();
  });
});

// Allow manual edit of final prompt on click
document.getElementById('systemPrompt').addEventListener('click', function() {
  this.removeAttribute('readonly');
  this.style.color = '#e0e0e0';
});

// ── Load country data from geodata files ────────────────────────────────────
async function loadCountryData(country) {
  if (!country) return;

  // Resolve base URL relative to this page (works for file:// and local server)
  const BASE = new URL('../frontend/public/data/', window.location.href).href;

  // Helper: flatten nested location tree
  function flattenLocs(locs, result = []) {
    for (const l of locs || []) {
      result.push({ id: l.id, name: l.name });
      flattenLocs(l.children, result);
    }
    return result;
  }

  try {
    // Load country geodata + festivals in parallel
    const [cdRes, festRes] = await Promise.all([
      fetch(BASE + 'countries/' + encodeURIComponent(country) + '.json'),
      fetch(BASE + 'countries_festivals/' + encodeURIComponent(country) + '.json'),
    ]);

    const cd = cdRes.ok ? await cdRes.json() : null;
    const fest = festRes.ok ? await festRes.json() : null;

    // Build countryData tab
    if (cd) {
      const locFlat = flattenLocs(cd.locations);
      const places = (cd.places || []).map(p => ({ id: p.id, name: p.name, category: p.subCategory || p.category }));
      document.getElementById('countryData').value = JSON.stringify(
        { locations_flat: locFlat, all_places: places },
        null, 2
      );
    }

    // Build tripContext tab — update country + festivals, keep other fields
    let ctx = {};
    try { ctx = JSON.parse(document.getElementById('tripContext').value); } catch(e) {}
    ctx.countries = [country];
    ctx.tripName = ctx.tripName || (country + ' Trip');

    // Rebuild festivals from loaded data
    const festivals = [];
    let festId = 1;
    if (fest) {
      for (const h of (fest.public_holidays || []).slice(0, 15)) {
        festivals.push({ id: `fest-${String(festId++).padStart(3,'0')}`, name: h.name, country, period: h.date || undefined });
      }
      for (const f of (fest.cultural_festivals || []).slice(0, 10)) {
        const months = f.typical_months?.length ? f.typical_months.map(m => ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]).join('/') : undefined;
        festivals.push({ id: `fest-${String(festId++).padStart(3,'0')}`, name: f.name, country, period: months });
      }
    }
    ctx.festivals = festivals;

    document.getElementById('tripContext').value = JSON.stringify(ctx, null, 2);

    // Clear tripPlan (country-specific — leave blank for user to fill)
    document.getElementById('tripPlan').value = JSON.stringify({ locations: [], unassigned: [] }, null, 2);

    rebuildFinalPrompt();
  } catch(e) {
    console.error('loadCountryData error:', e);
  }
}

// ── Rebuild helpers ──────────────────────────────────────────────────────────
function rebuildFinalPrompt() {
  try {
    const tripContext = JSON.parse(document.getElementById('tripContext').value);
    const tripPlan = JSON.parse(document.getElementById('tripPlan').value);
    const countryData = JSON.parse(document.getElementById('countryData').value);
    const instantApply = document.getElementById('modeSelect').value === 'instant';
    const sp = document.getElementById('systemPrompt');
    if (!sp.hasAttribute('readonly')) return; // user is editing manually — don't overwrite
    sp.value = buildSystemPrompt(tripContext, tripPlan, countryData, instantApply);
  } catch(e) { /* JSON mid-edit, ignore */ }
}

['tripContext', 'tripPlan', 'countryData', 'basePrompt'].forEach(id => {
  document.getElementById(id).addEventListener('input', rebuildFinalPrompt);
});
document.getElementById('modeSelect').addEventListener('change', rebuildFinalPrompt);

// ── System prompt builder (mirrors buildSystemPrompt in edge function) ──────
const DEFAULT_BASE = `You are Triptomat AI, a helpful travel planning assistant embedded in a trip planning application.

## Your role
- Help users plan their trips: suggest destinations, activities, restaurants, logistics, packing tips, cultural information, budgeting, and itinerary optimization.
- Answer travel-related questions thoughtfully and concisely.
- Be friendly, enthusiastic about travel, and culturally sensitive.
- You may respond in any language the user writes in.

## Tools available — when to use each
You have tools to interact directly with the user's trip. Use them proactively — changes are applied immediately and the user can always undo.

**suggest_places** — Use when recommending places without an explicit save intent.
- User asks "what are good restaurants in Tokyo?" → call suggest_places
- User asks "what should I see in Rome?" → call suggest_places
- Do NOT use for factual questions with no place list ("how much does the Colosseum cost?")

**add_place** — Use when user explicitly wants to add/save a place to their trip.
- "Add the Colosseum to my trip" → call add_place
- "Save this restaurant for later" → call add_place

**update_place** — Use when user wants to update details of an existing place.
- "Set the Louvre entry cost to €17" → call update_place
- "Add a note to Senso-ji" → call update_place

**add_days** — Use when user wants to extend the trip duration.
- "Add 2 more days to my trip" → call add_days(2)

**shift_trip_dates** — Use when user wants to move the entire trip to different dates.
- "Move my trip to start on March 15" → call shift_trip_dates

**set_itinerary** — Use for building or restructuring the full day-by-day schedule.
- "Plan me a 5-day itinerary in Japan" → call set_itinerary
- "Reorganize my schedule" → call set_itinerary
- Always include ALL days in one call. Never ask permission — just build it.

function buildSystemPrompt(tripContext, tripPlan, countryData, instantApply) {
  const BASE = document.getElementById('basePrompt').value.trim() || DEFAULT_BASE;
  let prompt = BASE;

  if (tripContext?.tripName) {
    const parts = [`\n\n## Current trip context\nYou are assisting with a trip called "${tripContext.tripName}".`];
    if (tripContext.countries?.length) parts.push(`Destinations: ${tripContext.countries.join(', ')}.`);
    if (tripContext.startDate && tripContext.endDate) parts.push(`Dates: ${tripContext.startDate} to ${tripContext.endDate}.`);
    else if (tripContext.numberOfDays) parts.push(`Duration: ${tripContext.numberOfDays} days.`);
    if (tripContext.currency) parts.push(`Display currency: ${tripContext.currency}.`);
    if (tripContext.status) parts.push(`Trip phase: ${tripContext.status}.`);
    if (tripContext.festivals?.length) {
      const lines = tripContext.festivals.map(f => {
        const id = f.id ? ` [event_id: ${f.id}]` : '';
        return f.period ? `  - ${f.name}${id} (${f.country}, ${f.period})` : `  - ${f.name}${id} (${f.country})`;
      }).join('\n');
      parts.push(`\nUpcoming festivals & events during this trip:\n${lines}`);
    }
    if (countryData?.locations_flat?.length) {
      const locList = countryData.locations_flat.map(l => l.id ? `${l.name} [location_id: ${l.id}]` : l.name).join(', ');
      parts.push(`Available destinations in ${tripContext.countries?.[0] || 'this country'}: ${locList}.`);
    }
    if (countryData?.all_places?.length) {
      const placeList = countryData.all_places.map(p => p.id ? `${p.name} [place_id: ${p.id}]` : p.name).join(', ');
      parts.push(`\nKnown attractions in this country (use EXACT names when referencing these): ${placeList}.`);
    }
    parts.push('Use this context to give relevant, specific advice. Reference the trip details naturally when helpful.');
    prompt += parts.join('\n');
  }

  if (tripPlan) {
    const planLines = [];
    const allNames = [];

    // Available hotels at top
    if (tripPlan.hotels?.length) {
      planLines.push('### Available hotels');
      for (const h of tripPlan.hotels) {
        planLines.push(`  ${h.name}${h.city ? ` (${h.city})` : ''} [hotel_id: ${h.id}]`);
      }
      planLines.push('');
    }

    for (const loc of (tripPlan.locations || [])) {
      const dayNums = loc.days.map(d => d.dayNumber);
      const locLabel = loc.name
        ? `### ${loc.name}${loc.id ? ` [location_id: ${loc.id}]` : ''}${dayNums.length ? ` (Days ${dayNums.join(', ')})` : ''}`
        : '### (No location)';
      planLines.push(locLabel);
      for (const day of loc.days) {
        const places = (day.places || []).map(p => {
          const id = p.id ? ` [place_id: ${p.id}]` : '';
          return p.start_time ? `${p.name}${id} @ ${p.start_time}` : `${p.name}${id}`;
        }).join(', ');
        const hotelPart = day.hotel_id
          ? ` | Hotel: [hotel_id: ${day.hotel_id}]`
          : day.hotel_name ? ` | Hotel: ${day.hotel_name}` : '';
        planLines.push(`  Day ${day.dayNumber}:${hotelPart} ${places || '(empty)'}`);
        (day.places || []).forEach(p => allNames.push(p.name));
      }
      if (loc.potential?.length) {
        planLines.push(`  Potential: ${loc.potential.map(p => `${p.name}${p.id ? ` [place_id: ${p.id}]` : ''} (${p.status})`).join(', ')}`);
        loc.potential.forEach(p => allNames.push(p.name));
      }
      planLines.push('');
    }
    if (tripPlan.unassigned?.length) {
      planLines.push('### Unassigned places');
      tripPlan.unassigned.forEach(p => { planLines.push(`  ${p.name} (${p.category}, ${p.status})`); allNames.push(p.name); });
    }

    const planText = planLines.join('\n').trim() || '(Empty — no places or days planned yet)';
    const nameRule = allNames.length
      ? '\nWhen referencing any place that appears in the current plan, use the EXACT name as listed — do not shorten, translate, or paraphrase it.'
      : '';

    if (instantApply) {
      prompt += `\n\n## Itinerary Planner Mode (Live)
Every call to set_itinerary is saved to the trip immediately — the user sees changes in real time.
${nameRule}

**set_itinerary** — The only tool available. Always include ALL days and ALL places in every call.
Place categories in the places array: Activities, Eateries, Events, Transportation (do NOT put Accommodations in places — hotels go in hotel_id/hotel_name/hotel_type at the day level).
Always include a short text explanation alongside the tool call.

### CRITICAL RULE — CALL set_itinerary IMMEDIATELY, NEVER ASK PERMISSION:
- If your response contains a day-by-day itinerary in ANY form, you MUST call set_itinerary in the SAME response.
- NEVER write a plan in text and then ask "should I add this to your schedule?" — call set_itinerary directly.
- NEVER say "would you like me to update the itinerary?" — just update it.
- The user can undo any change, so call set_itinerary without asking permission first.

### When to call set_itinerary:
- User asks you to plan, suggest, build, or create an itinerary of any length
- User asks to add, remove, or move a specific place
- Your response contains a day-by-day breakdown of any kind

### When NOT to call set_itinerary:
- User asks for open recommendations with no planning intent ("what are good restaurants in Tokyo?")
- User asks a factual travel question or wants tips, and your response has no day-by-day structure

### Hotel assignment per day:
- Each day has optional hotel_id / hotel_name fields indicating where the traveler sleeps that night.
- If the trip has hotels listed (see "Available hotels" in the plan), prefer hotel_id over hotel_name.
- Only set hotel_id / hotel_name when you know or are assigning where the traveler stays; leave blank if unknown.

### Place naming rules for set_itinerary:
- Use specific, searchable place names (e.g. "Senso-ji Temple", not "Buddhist temple")
- Do not use generic descriptions as place names (e.g. NOT "local restaurant", "scenic viewpoint")
- One entry per named place — do not combine multiple places in one name
- If a place appears in the current plan, copy its name EXACTLY as listed

\n\nCurrent plan:\n${planText}`;
    } else {
      prompt += `\n\n## Itinerary Planner Mode
You have two tools: set_itinerary and apply_itinerary.
${nameRule}

**set_itinerary** — Call this whenever you modify the itinerary. Always include ALL days and places, not just changes.
Categories: accommodation, eatery, attraction, service.
Always include a short text explanation alongside every tool call.

**apply_itinerary** — Saves the itinerary to the real trip.
- Call it AUTOMATICALLY right after set_itinerary when the user asks you to recommend, plan, build, or create an itinerary.
- Also call it when the user explicitly says to save/update/apply.
- Do NOT call it for minor suggestions, tips, or when the user is still exploring options interactively.

### Hotel assignment per day:
- Each day has optional hotel_id / hotel_name fields indicating where the traveler sleeps that night.
- If the trip has hotels listed (see "Available hotels" in the plan), prefer hotel_id over hotel_name.
- Only set hotel_id / hotel_name when you know or are assigning where the traveler stays; leave blank if unknown.

### Place naming rules for set_itinerary:
- Use specific, searchable place names (e.g. "Senso-ji Temple", not "Buddhist temple")
- Do not use generic descriptions as place names (e.g. NOT "local restaurant", "scenic viewpoint")
- One entry per named place — do not combine multiple places in one name
- If a place appears in the current plan, copy its name EXACTLY as listed

\n\nCurrent plan:\n${planText}`;
    }
  }

  return prompt;
}

// ── Send ────────────────────────────────────────────────────────────────────
async function send() {
  const promptText = document.getElementById('prompt').value.trim();
  if (!promptText) return;

  let tripContext, tripPlan, countryData;
  try { tripContext = JSON.parse(document.getElementById('tripContext').value); }
  catch(e) { alert('tripContext JSON invalid:\n' + e.message); return; }
  try { tripPlan = JSON.parse(document.getElementById('tripPlan').value); }
  catch(e) { alert('tripPlan JSON invalid:\n' + e.message); return; }
  try { countryData = JSON.parse(document.getElementById('countryData').value); }
  catch(e) { alert('countryData JSON invalid:\n' + e.message); return; }

  const instantApply = document.getElementById('modeSelect').value === 'instant';

  // Use whatever is in the systemPrompt textarea (user may have edited it)
  const systemPrompt = document.getElementById('systemPrompt').value.trim()
    || buildSystemPrompt(tripContext, tripPlan, countryData, instantApply);

  // Add user message to UI and history
  history.push({ role: 'user', parts: [{ text: promptText }] });
  appendMessage('user', promptText);
  document.getElementById('prompt').value = '';
  autoResize(document.getElementById('prompt'));

  let tools;
  try {
    const raw = document.getElementById('toolsSchema').value.trim();
    const declarations = JSON.parse(raw);
    tools = [{ functionDeclarations: declarations }];
  } catch(e) {
    alert('toolsSchema JSON invalid:\n' + e.message); return;
  }

  setLoading(true);

  try {

    const body = {
      system_instruction: { parts: [{ text: systemPrompt }] },
      contents: history,
      tools,
      toolConfig: { functionCallingConfig: { mode: 'AUTO' } },
      generationConfig: { maxOutputTokens: 16384, temperature: 0.7 },
    };

    const resp = await fetch(`${GEMINI_URL}?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`Gemini error ${resp.status}: ${err.slice(0, 300)}`);
    }

    const data = await resp.json();
    const parts = data.candidates?.[0]?.content?.parts || [];
    const textParts = parts.filter(p => p.text).map(p => p.text).join('');
    const functionCalls = parts.filter(p => p.functionCall);

    // Add assistant turn to history
    history.push({ role: 'model', parts });

    // Show text
    if (textParts) appendMessage('assistant', textParts);

    // Show tool calls
    if (functionCalls.length > 0) {
      appendToolCalls(functionCalls.map(p => p.functionCall));
    }

    if (!textParts && functionCalls.length === 0) {
      appendMessage('assistant', '(empty response — finishReason: ' + (data.candidates?.[0]?.finishReason || '?') + ')');
    }

  } catch(e) {
    appendError(e.message);
  } finally {
    setLoading(false);
  }
}

// ── UI helpers ──────────────────────────────────────────────────────────────
function appendMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `<div class="msg-role">${role}</div><div class="msg-text">${escHtml(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function appendToolCalls(calls) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  wrapper.innerHTML = '<div class="msg-role">tool calls</div>';
  const container = document.createElement('div');
  container.className = 'tool-calls';

  for (const call of calls) {
    const el = document.createElement('div');
    el.className = 'tool-call';
    const argsJson = JSON.stringify(call.args, null, 2);
    el.innerHTML = `
      <div class="tool-call-header">⚡ <strong>${escHtml(call.name)}</strong> <span>(${countPlaces(call)} places)</span></div>
      <div class="tool-call-body">${escHtml(argsJson)}</div>`;
    container.appendChild(el);
  }

  wrapper.appendChild(container);
  document.getElementById('messages').appendChild(wrapper);
  scrollBottom();
}

function countPlaces(call) {
  if (call.name === 'set_itinerary') {
    return (call.args?.days || []).reduce((s, d) => s + (d.places?.length || 0), 0) + ' places in ' + (call.args?.days?.length || 0) + ' days';
  }
  if (call.name === 'suggest_places') return (call.args?.places?.length || 0) + ' places';
  return '';
}

function appendError(msg) {
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.textContent = '⚠ ' + msg;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function setLoading(on) {
  document.getElementById('loading').className = 'loading' + (on ? ' visible' : '');
  document.getElementById('sendBtn').disabled = on;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearChat() {
  history = [];
  document.getElementById('messages').innerHTML = '';
}

function resetConversation() {
  history = [];
  document.getElementById('messages').innerHTML = '';
  // Restore final prompt to auto-computed
  const sp = document.getElementById('systemPrompt');
  sp.setAttribute('readonly', '');
  sp.style.color = '#888';
  rebuildFinalPrompt();
}

// ── Resize divider ───────────────────────────────────────────────────────────
(function() {
  const divider = document.getElementById('divider');
  const left = divider.previousElementSibling;
  let dragging = false, startX = 0, startW = 0;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = left.getBoundingClientRect().width;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientX - startX;
    const newW = Math.max(200, Math.min(startW + delta, window.innerWidth * 0.8));
    left.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ── Init on load ─────────────────────────────────────────────────────────────
document.getElementById('basePrompt').value = DEFAULT_BASE;

// Initialize tools tab with the default full tools schema (pretty-printed)
const DEFAULT_TOOLS = buildTools(false)[0].functionDeclarations;
document.getElementById('toolsSchema').value = JSON.stringify(DEFAULT_TOOLS, null, 2);

rebuildFinalPrompt();

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
